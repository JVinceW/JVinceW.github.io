<script>
const SKILL_PCT  = { beginner:25, skillful:60, experienced:85, expert:100 };
const LANG_LABEL = { native:"Native", advanced:"Advanced",
  upper_intermediate:"Upper intermediate",
  low_intermediate:"Lower intermediate", elementary:"Elementary" };

function entry({ title, meta, location, body }) {
  return `<div class="entry">
    <div class="row1">
      <span class="title">${title||""}</span>
      ${meta?`<span class="meta">${meta}</span>`:""}
    </div>
    ${location?`<div class="meta">${location}</div>`:""}
    ${body?`<div class="body">${body}</div>`:""}
  </div>`;
}

const SIDEBAR = {
  details(r){
    const rows = Object.entries(r.details||{}).map(([k,v])=>{
      const inner = (v && typeof v==="object" && v.href)
        ? `<a href="${v.href}">${v.text||v.href}</a>` : (v||"");
      return `<div class="kv"><span class="label">${k}</span>${inner}</div>`;
    }).join("");
    return rows ? `<h2>Details</h2>${rows}` : "";
  },
  links(r){
    if(!r.links||!r.links.length) return "";
    const rows = r.links.map(l=>`<div class="kv"><span class="label">${l.label}</span>${
      l.href?`<a href="${l.href}">${l.text||l.href}</a>`:(l.text||"")}</div>`).join("");
    return `<h2>Links</h2>${rows}`;
  },
  skills(r){
    if(!r.skills||!r.skills.length) return "";
    const rows = r.skills.map(s=>{
      const pct = SKILL_PCT[s.level] ?? 60;
      return `<div class="skill">${s.name}<div class="bar"><span style="width:${pct}%"></span></div></div>`;
    }).join("");
    return `<h2>Skills</h2>${rows}`;
  },
  languages(r){
    if(!r.languages||!r.languages.length) return "";
    const rows = r.languages.map(l=>
      `<div class="lang">${l.name} — <em>${LANG_LABEL[l.level]||l.level||""}</em></div>`
    ).join("");
    return `<h2>Languages</h2>${rows}`;
  },
  hobbies(r){
    if(!r.hobbies) return "";
    return `<h2>Hobbies</h2><div class="kv">${r.hobbies}</div>`;
  }
};

const MAIN = {
  profile(r){ return r.profile?`<h2>Profile</h2><div class="profile">${r.profile}</div>`:""; },
  workExperiences(r){ return (r.work&&r.work.length)?`<h2>Employment History</h2>${r.work.map(entry).join("")}`:""; },
  educations(r){ return (r.education&&r.education.length)?`<h2>Education</h2>${r.education.map(entry).join("")}`:""; },
  customSection(r,key){
    const sec = r.custom && r.custom[key];
    if(!sec) return "";
    return `<h2>${sec.heading}</h2>${(sec.items||[]).map(entry).join("")}`;
  }
};

function render(RESUME){
  if(!RESUME){ document.getElementById("page").innerHTML =
    `<div style="padding:40px;font-family:sans-serif">
      <h2>No RESUME data found</h2></div>`; return; }
  document.documentElement.style.setProperty("--accent", RESUME.meta?.accent || "#0F141F");
  const sidebarHTML = (RESUME.meta?.sidebarOrder||[]).map(k=>SIDEBAR[k]?SIDEBAR[k](RESUME):"").join("");
  const mainHTML = (RESUME.meta?.sectionsOrder||[]).map(k=>{
    if(k.startsWith("custom:")) return MAIN.customSection(RESUME, k.split(":")[1]);
    return MAIN[k]?MAIN[k](RESUME):"";
  }).join("");
  document.getElementById("page").innerHTML = `
    <aside class="sidebar">
      <div class="avatar-wrap">${RESUME.header?.avatar?`<img src="${RESUME.header.avatar}" alt="">`:""}</div>
      ${sidebarHTML}
    </aside>
    <main class="main">
      <header class="header">
        <h1>${RESUME.header?.fullName||""}</h1>
        ${RESUME.header?.role?`<div class="role">${RESUME.header.role}</div>`:""}
      </header>
      ${mainHTML}
    </main>`;
}

render(window.RESUME);
</script>
